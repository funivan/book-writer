name: Validate JSON

on:
  push:
    branches: [main]
    paths:
      - '**/*.json'
      - '!.claude/**'
  pull_request:
    paths:
      - '**/*.json'
      - '!.claude/**'

jobs:
  validate-json:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON
        uses: GrantBirki/json-yaml-validate@v3
        with:
          json_exclude_regex: '\.claude/'
