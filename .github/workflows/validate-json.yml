name: Validate JSON

on:
  push:
    branches: [main]
    paths:
      - '**/*.json'
      - '!.claude/**'
  pull_request:
    paths:
      - '**/*.json'
      - '!.claude/**'

jobs:
  validate-json:
    name: JSON Lint & Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON
        run: python3 scripts/validate-json.py
