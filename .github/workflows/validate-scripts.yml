name: Validate Shell Scripts

on:
  push:
    branches: [main]
    paths:
      - '**/*.sh'
  pull_request:
    branches: [main]
    paths:
      - '**/*.sh'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find shell scripts
        id: find-scripts
        run: |
          scripts=$(find . -name '*.sh' -type f | sort)
          echo "Found scripts:"
          echo "$scripts"
          if [ -z "$scripts" ]; then
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ShellCheck
        if: steps.find-scripts.outputs.has_scripts == 'true'
        run: |
          exit_code=0
          while IFS= read -r -d '' script; do
            echo "::group::Checking $script"
            if shellcheck --severity=warning "$script"; then
              echo "PASS: $script"
            else
              echo "FAIL: $script"
              exit_code=1
            fi
            echo "::endgroup::"
          done < <(find . -name '*.sh' -type f -print0 | sort -z)
          exit $exit_code

  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          exit_code=0
          while IFS= read -r -d '' script; do
            echo "Checking syntax: $script"
            if bash -n "$script"; then
              echo "  OK"
            else
              echo "  SYNTAX ERROR in $script"
              exit_code=1
            fi
          done < <(find . -name '*.sh' -type f -print0 | sort -z)
          exit $exit_code

  executable-check:
    name: Executable Permission Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check executable permissions
        run: |
          exit_code=0
          while IFS= read -r -d '' script; do
            if [ ! -x "$script" ]; then
              echo "WARNING: $script is not executable"
              exit_code=1
            fi
          done < <(find . -name '*.sh' -type f -print0 | sort -z)
          if [ $exit_code -eq 0 ]; then
            echo "All shell scripts have executable permissions."
          else
            echo ""
            echo "Fix with: chmod +x <script>"
            exit 1
          fi
